---
# Must be declared before common::monitor (and any other class that uses
# systemd::dropin_file / systemd::network / systemd::unit_file etc.) so that
# resource-style `class { 'systemd': ... }` in profile::system::systemd wins
# over the implicit `include systemd` performed by those upstream defined
# types. `merge: unique` on common::default::classes (see common.yaml)
# concatenates higher-priority entries first, so this prepends to the list.
common::default::classes:
  - common::system::systemd

common::system::systemd::manage_journald: true
common::system::time::ntp::ntp_client: 'systemd-timesyncd'
common::monitor::exporter::node::systemd: true
common::monitor::prometheus::init_style: 'systemd'

common::logging::rsyslog::enable: true
common::logging::rsyslog::purge_rsyslog_d: false
common::logging::rsyslog::log_remote: false
common::logging::rsyslog::log_local: true
common::logging::rsyslog::log_auth: true
common::logging::rsyslog::system_log: false

common::monitor::exporter::mtail::logs:
  - '/var/log/auth.log'

common::system::nsswitch::passwd:
  - 'systemd'
common::system::nsswitch::group:
  - 'systemd'
common::system::nsswitch::shadow:
  - 'systemd'
common::system::nsswitch::gshadow:
  - 'systemd'

common::system::systemd::journald_settings:
  Storage: persistent
  Compress: 'yes'
  Seal: 'yes'
  SplitMode: uid
  RateLimitIntervalSec: 30s
  RateLimitBurst: 1000
  SystemMaxUse: 2G
  SystemKeepFree: 2G
  SystemMaxFileSize: 250M
  SystemMaxFiles: 100
  RuntimeMaxUse: 1G
  RuntimeKeepFree: 1G
  RuntimeMaxFileSize: 100M
  RuntimeMaxFiles: 100
  ForwardToSyslog: 'yes'
  ForwardToKMsg: 'no'
  ForwardToConsole: 'no'
  ForwardToWall: 'yes'
  MaxLevelStore: debug
  MaxLevelSyslog: debug
  MaxLevelKMsg: notice
  MaxLevelConsole: info
  MaxLevelWall: emerg
