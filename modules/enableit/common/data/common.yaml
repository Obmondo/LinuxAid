### Motd
common::user_management::motd::enable: true

## Nsswitch
common::system::nsswitch::manage: false
common::system::nsswitch::sudoers:
  - "files"

## SSHD - ISO 27001/NIS2 Compliance
# This logs SSH key fingerprints for authentication audit trails
common::user_management::sshd::manage: true
common::user_management::sshd::kexalgorithms:
  - "curve25519-sha256@libssh.org"
  - "ecdh-sha2-nistp521"
  - "ecdh-sha2-nistp384"
  - "ecdh-sha2-nistp256"
  - "diffie-hellman-group-exchange-sha256"
common::user_management::sshd::ciphers:
  - "chacha20-poly1305@openssh.com"
  - "aes256-gcm@openssh.com"
  - "aes128-gcm@openssh.com"
  - "aes256-ctr"
  - "aes192-ctr"
  - "aes128-ctr"
common::user_management::sshd::macs:
  - "hmac-sha2-512-etm@openssh.com"
  - "hmac-sha2-256-etm@openssh.com"
  - "umac-128-etm@openssh.com"
  - "hmac-sha2-512"
  - "hmac-sha2-256"
  - "umac-128@openssh.com"

## NTP
common::system::time::manage_timezone: true
common::system::time::manage_ntp: false
common::system::time::ntp::servers:
