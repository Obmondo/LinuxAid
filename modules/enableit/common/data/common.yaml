common::system::openvox::package_name: "openvox-agent"
common::system::openvox::configure_agent: true

# Update the linuxaid-cli version as per the latest release on Github
# https://github.com/Obmondo/linuxaid-cli/releases/latest
#
# Additionally, we maintain linuxaid-cli archive's sha256 checksums of last 2 releases.
# This way we can easily roll-back to previous version with ease.
# This can be obtained easily in the specific release page's asset section.
# In this file, we maintain for amd64 (which is default).
# Update other architecture checksums in their respective heira config file.
# https://github.com/Obmondo/LinuxAid/blob/master/modules/enableit/common/data/architectures/armv7l.yaml
common::system::openvox::linuxaid_cli::install_method: package
common::system::openvox::linuxaid_cli::version: 1.2.1
common::system::openvox::linuxaid_cli::checksums:
  1.2.0: 53d285fb6a8fca93609fe0ce71fc31ea0158aafefb3e7890b82b09a6d18134e4
  1.2.1: 4b3f7e4acc244a17e8c1294ce2029107b542cec9b6627f39387397a6406bd0af

