---
role::projectmanagement::gitlab_ci_runner::concurrent: 1
role::projectmanagement::gitlab_ci_runner::docker_defaults:
  privileged: false
  tls_verify: false
  disable_cache: false
  volumes:
    - '/cache'
role::projectmanagement::gitlab_ci_runner::docker_runners: {}
role::projectmanagement::gitlab_ci_runner::shell_runners: {}
# url and registration_token are required — set them in node-specific Hiera
